        let nums = [1, 2, 3, 4, 5, 6];

        function evenOdd(arr) {
            let result = {
                even: [],
                odd: []
            };

        ];

        function findTopper(arr) {
            let topper = arr[0];

            for (let s of arr) {

                }
            }
